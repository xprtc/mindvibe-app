<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#F0FDF4" stroke="#16A34A" stroke-width="2.5"/>

  <!-- Wild white hair - fluffy cloud-like -->
  <ellipse cx="60" cy="38" rx="42" ry="30" fill="#E8E8E8"/>
  <ellipse cx="25" cy="45" rx="16" ry="18" fill="#F0F0F0"/>
  <ellipse cx="95" cy="45" rx="16" ry="18" fill="#F0F0F0"/>
  <ellipse cx="60" cy="22" rx="28" ry="14" fill="#F5F5F5"/>
  <ellipse cx="35" cy="28" rx="14" ry="12" fill="#EDEDED"/>
  <ellipse cx="85" cy="28" rx="14" ry="12" fill="#EDEDED"/>
  <ellipse cx="20" cy="55" rx="10" ry="13" fill="#EBEBEB"/>
  <ellipse cx="100" cy="55" rx="10" ry="13" fill="#EBEBEB"/>
  <!-- Extra wisps -->
  <ellipse cx="18" cy="38" rx="9" ry="10" fill="#F2F2F2"/>
  <ellipse cx="102" cy="38" rx="9" ry="10" fill="#F2F2F2"/>

  <!-- Face (warm skin tone) -->
  <ellipse cx="60" cy="62" rx="30" ry="32" fill="#FDDCB5"/>

  <!-- Ears -->
  <ellipse cx="30" cy="62" rx="6" ry="8" fill="#F5C99A"/>
  <ellipse cx="90" cy="62" rx="6" ry="8" fill="#F5C99A"/>

  <!-- Eyes - kind, warm eyes -->
  <ellipse cx="47" cy="56" rx="6.5" ry="7" fill="white"/>
  <ellipse cx="73" cy="56" rx="6.5" ry="7" fill="white"/>
  <!-- Pupils - looking slightly up/friendly -->
  <circle cx="48" cy="55" r="3.5" fill="#4A3728"/>
  <circle cx="74" cy="55" r="3.5" fill="#4A3728"/>
  <!-- Eye shine -->
  <circle cx="49.5" cy="53.5" r="1.3" fill="white"/>
  <circle cx="75.5" cy="53.5" r="1.3" fill="white"/>

  <!-- Friendly eyebrows - slightly raised -->
  <path d="M39 48 Q47 43 55 47" stroke="#9E8E7E" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M65 47 Q73 43 81 48" stroke="#9E8E7E" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="60" cy="66" rx="4" ry="3.5" fill="#F0C494"/>

  <!-- Big friendly mustache -->
  <path d="M42 74 Q48 70 60 72 Q72 70 78 74 Q74 78 60 76 Q46 78 42 74Z" fill="#D4D4D4"/>
  <path d="M44 74 Q50 71 60 72.5 Q70 71 76 74 Q72 77 60 75.5 Q48 77 44 74Z" fill="#C8C8C8"/>

  <!-- Warm smile under mustache -->
  <path d="M50 79 Q60 86 70 79" stroke="#C4956A" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Rosy cheeks -->
  <circle cx="40" cy="70" r="5" fill="#FBCBB0" opacity="0.6"/>
  <circle cx="80" cy="70" r="5" fill="#FBCBB0" opacity="0.6"/>

  <!-- Subtle wrinkle lines (friendly) -->
  <path d="M38 60 Q36 64 38 68" stroke="#E8C5A0" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M82 60 Q84 64 82 68" stroke="#E8C5A0" stroke-width="0.8" fill="none" opacity="0.5"/>
</svg>
